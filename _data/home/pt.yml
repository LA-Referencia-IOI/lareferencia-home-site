sections:
  - type: hero_map
    title: "LA Referencia é a Rede Latino-Americana e Espanhola de Ciência Aberta"
    subtitle: "A LA Referencia dá suporte às estratégias nacionais de Ciência Aberta na América Latina e na Espanha por meio de sua gama de serviços."

  - type: explore_band
    title: "Explore as publicações científicas em Acesso Aberto"
    placeholder: "Pesquisar nas publicações"
    button_label: "Explorar a Rede"
    subtitle: "Milhares de recursos disponíveis gratuitamente gerados na América Latina e Espanha"

  - type: band_message
    text: "Navegue por publicações científicas em Acesso Aberto da América Latina e da Espanha"

  - type: search_stats
    action_url: "https://www.lareferencia.info/vufind/Search/Results"
    method: "get"
    query_param: "lookfor"
    scope_param: "type"
    placeholder: "Começar busca"
    scope_options:
      - label: "Todos os campos"
        value: "AllFields"
      - label: "Título"
        value: "Title"
      - label: "Autor"
        value: "Author"
    search_label: "Buscar"
    advanced_label: "Busca avançada"
    advanced_url: "https://www.lareferencia.info/vufind/Search/Advanced"
    metrics:
      nodes_label: "Países Membros"
      nodes_value: "10"
      documents_label: "Documentos"
      documents_value: "5.820.482"
      breakdown:
        - label: "Artigo"
          value: "3.578.992"
        - label: "Tese"
          value: "1.288.071"
        - label: "Tese doutoral"
          value: "621.180"
        - label: "Capítulo"
          value: "112.471"

  - type: faq_cta
    title: "Quais medidas devo tomar se minha pesquisa ou repositório institucional não estiver disponível na LA Referencia?"
    body: "A LA Referencia é um agregador que coleta metadados dos repositórios dos países participantes por esse motivo não é possível depositar diretamente seus resultados de pesquisa. No entanto, você pode encontrar as informações necessárias clicando no link a seguir."
    button_label: "Saiba mais"
    button_url: "/pt/about/como-participar"
    image: "/assets/img/faq.svg"

  - type: resources_cards
    title: "Navegue pelos nossos materiais de capacitação mais recentes"
    cards:
      - title: "Instalación y configuración básica de DSpace 7.5"
        summary: "Guillermo Esteban Murillo Goussen, técnico de LA Referencia explica el detalle sobre la instalación y configuración básica de DSpace 7.5."
        image: "/assets/img/resource1.svg"
        button_label: "Abrir recurso"
        button_url: "https://recursos.lareferencia.info/download/instalacion-y-configuracion-basica-de-dspace-7-5/"
      - title: "Acceso a los datos de producción científica financiados con fondos públicos: DATACIENCIA"
        summary: "Panelista: Carolina González."
        image: "/assets/img/resource2.svg"
        button_label: "Abrir recurso"
        button_url: "https://recursos.lareferencia.info/download/acceso-a-los-datos-de-produccion-cientifica-financiados-con-fondos-publicos-dataciencia/"
      - title: "Experiencias en la migración de repositorios institucionales DSpace"
        summary: "Ponente: Ariel Lira, PREBI-SEDICI, Universidad Nacional de La Plata, Argentina."
        image: "/assets/img/resource3.svg"
        button_label: "Abrir recurso"
        button_url: "https://recursos.lareferencia.info/download/experiencias-en-la-migracion-de-repositorios-institucionales-dspace/"

