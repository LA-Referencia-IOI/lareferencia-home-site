  - type: band_message
    text: "Explore las publicaciones científicas de América Latina y España en Acceso Abierto"

  - type: search_stats
    action_url: "https://www.lareferencia.info/vufind/Search/Results"
    method: "get"
    query_param: "lookfor"
    scope_param: "type"
    placeholder: "Comenzar a buscar"
    scope_options:
      - label: "Todos los campos"
        value: "AllFields"
      - label: "Título"
        value: "Title"
      - label: "Autor"
        value: "Author"
    search_label: "Buscar"
    advanced_label: "Búsqueda avanzada"
    advanced_url: "https://www.lareferencia.info/vufind/Search/Advanced"
    metrics:
      nodes_label: "Nodos Nacionales"
      nodes_value: "10"
      documents_label: "Documentos"
      documents_value: "5.820.482"
      breakdown:
        - label: "Artículo"
          value: "3.578.992"
        - label: "Tesis"
          value: "1.288.071"
        - label: "Tesis doctoral"
          value: "621.180"
        - label: "Capítulo"
          value: "112.471"

  - type: faq_cta
    title: "¿Qué debo hacer si mi investigación o repositorio no se encuentra en LA Referencia?"
    body: "LA Referencia es un agregador que cosecha metadata de los repositorios de nuestros nodos nacionales, por ese motivo no es posible depositar directamente sus resultados de investigación. No obstante, usted puede encontrar la información necesaria haciendo clic en el siguiente enlace."
    button_label: "Obtener información"
    button_url: "/es/about/como-ser-parte"
    image: "/assets/img/business-people-shaking-hands-together.jpg"

  - type: resources_cards
    title: "Explore nuestros últimos recursos de capacitación"
    cards:
      - title: "Instalación y configuración básica de DSpace 7.5"
        summary: "Guillermo Esteban Murillo Goussen, técnico de LA Referencia, explica el detalle sobre la instalación y configuración básica de DSpace 7.5."
        image: "/assets/img/cloud-storage-banner-background-remixed-from-public-domain-by-nasa.jpg"
        button_label: "Ir al Recurso"
        button_url: "https://recursos.lareferencia.info/download/instalacion-y-configuracion-basica-de-dspace-7-5/"
      - title: "Acceso a los datos de producción científica financiados con fondos públicos: DATACIENCIA"
        summary: "Panelista: Carolina González."
        image: "/assets/img/futuristic-finance-digital-market-graph-user-interface-with-diagram-technology-hud-graphic-concept.jpg"
        button_label: "Ir al Recurso"
        button_url: "https://recursos.lareferencia.info/download/acceso-a-los-datos-de-produccion-cientifica-financiados-con-fondos-publicos-dataciencia/"
      - title: "Experiencias en la migración de repositorios institucionales DSpace"
        summary: "Ponente: Ariel Lira, PREBI-SEDICI, Universidad Nacional de La Plata, Argentina."
        image: "/assets/img/globe-internet-icon-line-connection-circuit-board.jpg"
        button_label: "Ir al Recurso"
        button_url: "https://recursos.lareferencia.info/download/experiencias-en-la-migracion-de-repositorios-institucionales-dspace/"

