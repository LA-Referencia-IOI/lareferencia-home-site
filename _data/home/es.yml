  - type: faq_cta
    title: "Que debo hacer si mi repositorio no aparece en LA Referencia?"
    body: "Escribenos y te guiaremos en la incorporacion de tu repositorio y en la alineacion de metadatos."
    button_label: "Contactar"
    button_url: "/es/contact"
    image: "/assets/img/business-people-shaking-hands-together.jpg"

  - type: resources_cards
    title: "Explore nuestros ultimos recursos de capacitacion"
    cards:
      - title: "Instalacion basica de DSpace 7.5"
        summary: "Guia de implementacion para equipos de repositorios que necesitan una base de despliegue rapida."
        image: "/assets/img/cloud-storage-banner-background-remixed-from-public-domain-by-nasa.jpg"
        button_label: "Leer recurso"
        button_url: "/es/news"
      - title: "Acceso a datos financiados con fondos publicos"
        summary: "Recomendaciones practicas para mejorar politica e interoperabilidad de repositorios."
        image: "/assets/img/futuristic-finance-digital-market-graph-user-interface-with-diagram-technology-hud-graphic-concept.jpg"
        button_label: "Abrir guia"
        button_url: "/es/news"
      - title: "Migracion de repositorios institucionales"
        summary: "Experiencias y lecciones aprendidas en procesos de migracion en la region."
        image: "/assets/img/globe-internet-icon-line-connection-circuit-board.jpg"
        button_label: "Ver lecciones"
        button_url: "/es/news"

