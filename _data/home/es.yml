  - type: search_stats
    action_url: "https://www.lareferencia.info/vufind/Search/Results"
    method: "get"
    query_param: "lookfor"
    scope_param: "type"
    placeholder: "Comenzar a buscar"
    scope_options:
      - label: "Todos los campos"
        value: "AllFields"
      - label: "Titulo"
        value: "Title"
