  - type: band_message
    text: "Explore open access scientific publications from Latin America and Spain"

  - type: search_stats
    action_url: "https://www.lareferencia.info/vufind/Search/Results"
    method: "get"
    query_param: "lookfor"
    scope_param: "type"
    placeholder: "Start searching"
    scope_options:
      - label: "All fields"
        value: "AllFields"
      - label: "Title"
        value: "Title"
      - label: "Author"
        value: "Author"
    search_label: "Search"
    advanced_label: "Advanced search"
    advanced_url: "https://www.lareferencia.info/vufind/Search/Advanced"
    metrics:
      nodes_label: "National Nodes"
      nodes_value: "12"
      documents_label: "Documents"
      documents_value: "5,820,482"
      breakdown:
        - label: "Article"
          value: "3,578,992"
        - label: "Thesis"
          value: "1,288,071"
        - label: "Doctoral thesis"
          value: "621,180"
        - label: "Book chapter"
          value: "112,471"

  - type: faq_cta
    title: "What should I do if my repository is not in LA Referencia?"
    body: "Contact us and we will guide your repository onboarding and metadata alignment process."
    button_label: "Contact team"
    button_url: "/en/contact"
    image: "/assets/img/business-people-shaking-hands-together.jpg"

  - type: resources_cards
    title: "Explore our latest training resources"
    cards:
      - title: "DSpace 7.5 basic setup"
        summary: "Implementation guide for repository teams that need a fast deployment baseline."
        image: "/assets/img/cloud-storage-banner-background-remixed-from-public-domain-by-nasa.jpg"
        button_label: "Read resource"
        button_url: "/en/news"
      - title: "Public funded research data access"
        summary: "Practical recommendations to improve policy and repository interoperability."
        image: "/assets/img/futuristic-finance-digital-market-graph-user-interface-with-diagram-technology-hud-graphic-concept.jpg"
        button_label: "Open guide"
        button_url: "/en/news"
      - title: "Institutional repository migration"
        summary: "Experiences and lessons learned from migration projects in the region."
        image: "/assets/img/globe-internet-icon-line-connection-circuit-board.jpg"
        button_label: "View lessons"
        button_url: "/en/news"

