sections:
  - type: hero_map
    title: "LA Referencia is the Latin American and Spanish network for Open Science"
    subtitle: "LA Referencia supports national Open Science strategies in Latin America and Spain through its range of services."

  - type: explore_band
    title: "Browse Open Access scientific publications"
    placeholder: "Search publications"
    button_label: "Explore Network"
    subtitle: "Do not miss out on variants, browse Open Access scientific publications."

  - type: band_message
    text: "Browse Open Access scientific publications from Latin America and Spain"

  - type: search_stats
    action_url: "https://www.lareferencia.info/vufind/Search/Results"
    method: "get"
    query_param: "lookfor"
    scope_param: "type"
    placeholder: "Start searching"
    scope_options:
      - label: "All fields"
        value: "AllFields"
      - label: "Title"
        value: "Title"
      - label: "Author"
        value: "Author"
    search_label: "Search"
    advanced_label: "Advanced search"
    advanced_url: "https://www.lareferencia.info/vufind/Search/Advanced"
    metrics:
      nodes_label: "National Nodes"
      nodes_value: "10"
      documents_label: "Documents"
      documents_value: "5,820,482"
      breakdown:
        - label: "Article"
          value: "3,578,992"
        - label: "Thesis"
          value: "1,288,071"
        - label: "Doctoral thesis"
          value: "621,180"
        - label: "Book chapter"
          value: "112,471"

  - type: faq_cta
    title: "What steps should I take if my research or institutional repository is not available in LA Referencia?"
    body: "LA Referencia is an aggregator that harvests metadata from the repositories of our national nodes. For this reason, it is not possible to directly deposit your research outputs. However, you can find the necessary information by clicking the following link."
    button_label: "Learn more"
    button_url: "/en/about/how-to-join"
    image: "/assets/img/faq.svg"

  - type: resources_cards
    title: "Browse our most recent training materials"
    cards:
      - title: "Instalación y configuración básica de DSpace 7.5"
        summary: "Guillermo Esteban Murillo Goussen, técnico de LA Referencia explica el detalle sobre la instalación y configuración básica de DSpace 7.5."
        image: "/assets/img/resource1.svg"
        button_label: "View Resource"
        button_url: "https://recursos.lareferencia.info/download/instalacion-y-configuracion-basica-de-dspace-7-5/"
      - title: "Acceso a los datos de producción científica financiados con fondos públicos: DATACIENCIA"
        summary: "Panelista: Carolina González."
        image: "/assets/img/resource2.svg"
        button_label: "View Resource"
        button_url: "https://recursos.lareferencia.info/download/acceso-a-los-datos-de-produccion-cientifica-financiados-con-fondos-publicos-dataciencia/"
      - title: "Experiencias en la migración de repositorios institucionales DSpace"
        summary: "Ponente: Ariel Lira, PREBI-SEDICI, Universidad Nacional de La Plata, Argentina."
        image: "/assets/img/resource3.svg"
        button_label: "View Resource"
        button_url: "https://recursos.lareferencia.info/download/experiencias-en-la-migracion-de-repositorios-institucionales-dspace/"

