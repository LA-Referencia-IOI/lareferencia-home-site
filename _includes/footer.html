{% assign nav = site.data.navigation[page.language] %}

<footer class="site-footer lr-site-footer">
  <div class="wrapper">
    <div class="lr-footer-main">
      <div class="lr-footer-brand">
        <img src="{{ '/assets/img/la-referencia-white.png' | relative_url }}" alt="LA Referencia">
        <p>{{ nav.footer.brand_subtitle | default: site.description }}</p>
      </div>
      <ul class="lr-footer-social" aria-label="Social links">
        {% for item in nav.footer.social %}
          <li>
            <a class="lr-social-link lr-social-{{ item.icon }}" href="{{ item.href }}" target="_blank" rel="noopener" aria-label="{{ item.label }}">
              <span class="lr-social-glyph" aria-hidden="true">{{ item.glyph }}</span>
            </a>
          </li>
        {% endfor %}
      </ul>
    </div>

    <div class="lr-footer-bottom">
      <img class="lr-footer-cc" src="{{ '/assets/img/cc-by.png' | relative_url }}" alt="CC BY">
      <p>{{ nav.footer.legal_text }}</p>
    </div>
  </div>
</footer>
