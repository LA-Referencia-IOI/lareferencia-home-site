<!-- Mailchimp Signup Form -->
<div id="mc_embed_shell">
  <link href="//cdn-images.mailchimp.com/embedcode/classic-061523.css" rel="stylesheet" type="text/css">
  <style type="text/css">
    #mc_embed_signup {
      background: var(--surface-color, #fff);
      clear: left;
      font-family: "Titillium Web", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem;
      border: 1px solid var(--border-color, #dedede);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }
    #mc_embed_signup h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      color: var(--secondary-color, #3b3a3c);
      line-height: 1.2;
    }
    .mc-form-subtitle {
      margin: 0 0 1.5rem;
      color: var(--text-light, #66686a);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    #mc_embed_signup .mc-field-group {
      margin-bottom: 1.25rem;
    }
    #mc_embed_signup .mc-field-group label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-color, #3b3a3c);
    }
    #mc_embed_signup .mc-field-group input[type="email"],
    #mc_embed_signup .mc-field-group input[type="text"],
    #mc_embed_signup .mc-field-group select {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border-color, #dedede);
      border-radius: 6px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text-color, #3b3a3c);
      background: #fff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    #mc_embed_signup .mc-field-group input[type="email"]:focus,
    #mc_embed_signup .mc-field-group input[type="text"]:focus,
    #mc_embed_signup .mc-field-group select:focus {
      outline: none;
      border-color: var(--primary-color, #3a5180);
      box-shadow: 0 0 0 3px rgba(58, 81, 128, 0.12);
    }
    #mc_embed_signup .indicates-required {
      text-align: right;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      color: var(--text-light, #66686a);
    }
    #mc_embed_signup .asterisk {
      color: var(--color-red, #f1686a);
    }
    #mc_embed_signup .clear {
      clear: both;
    }
    #mc_embed_signup .foot {
      margin-top: 1.5rem;
    }
    #mc_embed_signup #mce-responses .response {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.92rem;
    }
    #mc_embed_signup #mce-error-response {
      background-color: #fce4e4;
      color: #c0392b;
      border: 1px solid #f5c6cb;
    }
    #mc_embed_signup #mce-success-response {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    /* Reset Mailchimp button containers */
    #mc_embed_signup .optionalParent {
      margin: 0 !important;
      padding: 0 !important;
    }
    #mc_embed_signup .optionalParent .clear.foot {
      margin: 0 !important;
      padding: 0 !important;
    }
    /* Override Mailchimp's default button styles */
    #mc_embed_signup .button,
    #mc_embed_signup input.button {
      background-color: var(--primary-color, #3a5180) !important;
      color: #fff !important;
      border: none !important;
      padding: 0.6rem 1.5rem !important;
      margin: 0 !important;
      font-size: 0.95rem !important;
      font-weight: 600 !important;
      font-family: inherit !important;
      border-radius: 6px !important;
      cursor: pointer !important;
      transition: background-color 0.2s ease !important;
      display: inline-block !important;
      line-height: 1.5 !important;
      height: auto !important;
      min-height: auto !important;
      text-decoration: none !important;
      box-shadow: none !important;
    }
    #mc_embed_signup .button:hover,
    #mc_embed_signup input.button:hover {
      background-color: var(--primary-strong, #2d3f63) !important;
    }
    /* Hide Mailchimp branding */
    #mc_embed_signup .brandingLogo {
      display: none !important;
    }
  </style>
