<section class="lr-home-hero">
  <div class="wrapper lr-home-hero-inner">
    <div class="lr-hero-text">
      <h1>{{ include.section.title }}</h1>
      <p>{{ include.section.subtitle }}</p>
    </div>
    <div class="lr-hero-map-wrap">
      <div class="lr-hero-map-frame">
        <img class="lr-hero-map" src="{{ include.section.map_image | relative_url }}" alt="Regional map">
        {% for hotspot in include.section.hotspots %}
          <span class="lr-hotspot" style="left: {{ hotspot.x }}%; top: {{ hotspot.y }}%;">{{ hotspot.label }}</span>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
