<section class="lr-faq-cta wrapper">
  <div class="lr-faq-content">
    <h2>{{ include.section.title }}</h2>
    <p>{{ include.section.body }}</p>
    {% assign cta_url = include.section.button_url | default: '#' %}
    <a class="lr-btn lr-btn-solid" href="{% if cta_url contains '://' %}{{ cta_url }}{% else %}{{ cta_url | relative_url }}{% endif %}">{{ include.section.button_label }}</a>
  </div>
  <div class="lr-faq-image-wrap">
    <img src="{{ include.section.image | relative_url }}" alt="Support image">
  </div>
</section>
